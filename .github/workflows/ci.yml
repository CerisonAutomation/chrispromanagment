name: Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # -------------------------------------------------------
  # Type check all workspaces
  # -------------------------------------------------------
  type-check:
    name: Type Check (all workspaces)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Type check (root CMS)
        run: npx tsc --noEmit

      - name: Type check (workspace packages)
        run: pnpm turbo type-check
        continue-on-error: true

  # -------------------------------------------------------
  # Test all workspaces
  # -------------------------------------------------------
  test:
    name: Test (all workspaces)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run tests (all workspaces)
        run: pnpm test:all --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false

  # -------------------------------------------------------
  # Lint all workspaces
  # -------------------------------------------------------
  lint:
    name: Lint (all workspaces)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint (root CMS)
        run: npx eslint src --max-warnings 0
        continue-on-error: true

      - name: Lint (workspace packages)
        run: pnpm turbo lint
        continue-on-error: true

  # -------------------------------------------------------
  # Build root CMS app (critical path)
  # -------------------------------------------------------
  build-cms:
    name: Build — CMS App (root)
    runs-on: ubuntu-latest
    needs: [type-check]
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build (root CMS)
        run: pnpm build

  # -------------------------------------------------------
  # Build workspace apps (parallel matrix)
  # -------------------------------------------------------
  build-apps:
    name: Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [type-check]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: [booking, enterprise, website]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Type check (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npx next build
        continue-on-error: true

  # -------------------------------------------------------
  # AI / MCP integration tests (root app)
  # -------------------------------------------------------
  ai-validation:
    name: AI/MCP Integration Tests
    runs-on: ubuntu-latest
    needs: [build-cms, test]
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}
      MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate AI Service Types
        run: npx tsc --noEmit src/lib/ai-service.ts || true

      - name: Validate Unified AI Hooks
        run: npx tsc --noEmit src/hooks/useUnifiedAI.ts || true

      - name: Test MCP Resource Sync
        run: npx tsc --noEmit src/lib/mcp-resource-sync.ts || true

      - name: Check API Routes Structure
        run: |
          test -f src/app/api/mcp/tools/\[tool\]/route.ts && echo "✓ MCP tools route exists"

  # -------------------------------------------------------
  # Security audit (all workspaces)
  # -------------------------------------------------------
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
