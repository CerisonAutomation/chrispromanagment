name: Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  # -------------------------------------------------------
  # Root CMS app (christiano-property-management)
  # -------------------------------------------------------
  build-cms:
    name: Build — CMS App (root)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # --no-frozen-lockfile is required here during the transition from npm to pnpm.
        # The root app still has package-lock.json; pnpm-lock.yaml will be committed in Phase 3.
        run: pnpm install --no-frozen-lockfile

      - name: Type check (root CMS)
        run: npx tsc --noEmit

      - name: Lint (root CMS)
        run: npx eslint src --max-warnings 0
        continue-on-error: true

      - name: Build (root CMS)
        run: npm run build

  # -------------------------------------------------------
  # Booking app
  # -------------------------------------------------------
  build-booking:
    name: Build — Booking App
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # || true is intentional: these apps have no pnpm-lock.yaml yet.
        # Installation failures here won't block the root CMS build (the critical path).
        run: pnpm install --frozen-lockfile || true

      - name: Type check (booking)
        working-directory: apps/booking
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build (booking)
        working-directory: apps/booking
        run: npx next build
        continue-on-error: true

  # -------------------------------------------------------
  # Enterprise app
  # -------------------------------------------------------
  build-enterprise:
    name: Build — Enterprise App
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # || true is intentional: apps have no pnpm-lock.yaml yet during this transition phase.
        run: pnpm install --frozen-lockfile || true

      - name: Type check (enterprise)
        working-directory: apps/enterprise
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build (enterprise)
        working-directory: apps/enterprise
        run: npx next build
        continue-on-error: true

  # -------------------------------------------------------
  # Website app
  # -------------------------------------------------------
  build-website:
    name: Build — Website App
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # || true is intentional: apps have no pnpm-lock.yaml yet during this transition phase.
        run: pnpm install --frozen-lockfile || true

      - name: Type check (website)
        working-directory: apps/website
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build (website)
        working-directory: apps/website
        run: npx next build
        continue-on-error: true

  # -------------------------------------------------------
  # Shared packages type-check
  # -------------------------------------------------------
  check-packages:
    name: Type Check — Shared Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # || true is intentional: packages have no pnpm-lock.yaml yet during this transition phase.
        run: pnpm install --frozen-lockfile || true

      - name: Type check shared-types
        working-directory: packages/shared-types
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Type check shared-utils
        working-directory: packages/shared-utils
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Type check ui-components
        working-directory: packages/ui-components
        run: npx tsc --noEmit
        continue-on-error: true

  # -------------------------------------------------------
  # AI / MCP integration tests (root app)
  # -------------------------------------------------------
  ai-validation:
    name: AI/MCP Integration Tests
    runs-on: ubuntu-latest
    needs: build-cms
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}
      MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # --no-frozen-lockfile: root app is still npm-managed during this transition phase.
        # A pnpm-lock.yaml will be committed in Phase 3 of the consolidation.
        run: pnpm install --no-frozen-lockfile

      - name: Validate AI Service Types
        run: npx tsc --noEmit src/lib/ai-service.ts || true

      - name: Validate Unified AI Hooks
        run: npx tsc --noEmit src/hooks/useUnifiedAI.ts || true

      - name: Test MCP Resource Sync
        run: npx tsc --noEmit src/lib/mcp-resource-sync.ts || true

      - name: Check API Routes Structure
        run: |
          test -f src/app/api/mcp/tools/\[tool\]/route.ts && echo "✓ MCP tools route exists"

  # -------------------------------------------------------
  # Security audit (all workspaces)
  # -------------------------------------------------------
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # --no-frozen-lockfile: root app is still npm-managed during this transition phase.
        # A pnpm-lock.yaml will be committed in Phase 3 of the consolidation.
        run: pnpm install --no-frozen-lockfile

      - name: Run npm audit (root)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
