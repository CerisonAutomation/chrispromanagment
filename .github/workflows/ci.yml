name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings 0
        continue-on-error: true

      - name: Build
        run: npm run build

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI Service Tests
        run: |
          echo "Testing AI Service Layer..."
          # Add AI service unit tests when available
          # npm run test:ai

      - name: Validate MCP Client
        run: |
          echo "Validating MCP Client..."
          npx tsc --noEmit src/lib/mcp-client.ts

      - name: Test Block Registry
        run: |
          echo "Testing Block Registry..."
          node -e "
            const { BLOCK_REGISTRY } = require('./src/lib/block-registry.ts');
            const blockCount = Object.keys(BLOCK_REGISTRY).length;
            console.log(\`✓ Block registry loaded with \${blockCount} blocks\`);
            if (blockCount < 40) {
              console.error('ERROR: Expected at least 40 blocks');
              process.exit(1);
            }
          "

  ai-validation:
    name: AI/MCP Integration Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_BASE_URL: ${{ secrets.MCP_BASE_URL || 'http://localhost:3001' }}
      MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate AI Service Types
        run: |
          echo "Checking AI Service TypeScript..."
          npx tsc --noEmit src/lib/ai-service.ts || true

      - name: Validate Unified AI Hooks
        run: |
          echo "Checking Unified AI Hooks..."
          npx tsc --noEmit src/hooks/useUnifiedAI.ts || true

      - name: Test MCP Resource Sync
        run: |
          echo "Validating MCP Resource Sync..."
          npx tsc --noEmit src/lib/mcp-resource-sync.ts || true

      - name: Check API Routes Structure
        run: |
          echo "Validating MCP API Routes..."
          test -f src/app/api/mcp/tools/\[tool\]/route.ts && echo "✓ MCP tools route exists"

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
