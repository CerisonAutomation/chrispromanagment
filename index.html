<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F10" />
    <meta name="description" content="Malta's premier luxury short-term rental management company. Book your dream vacation rental today." />
    
    {/* Open Graph / Facebook */}
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://christianoproperties.com" />
    <meta property="og:title" content="Christiano Property Management | Malta Vacation Rentals" />
    <meta property="og:description" content="Experience luxury vacation rentals in Malta with full-service property management." />
    <meta property="og:image" content="https://christianoproperties.com/og-image.jpg" />
    
    {/* Twitter */}
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://christianoproperties.com" />
    <meta property="twitter:title" content="Christiano Property Management | Malta Vacation Rentals" />
    <meta property="twitter:description" content="Experience luxury vacation rentals in Malta with full-service property management." />
    <meta property="twitter:image" content="https://christianoproperties.com/og-image.jpg" />
    
    {/* Structured Data */}
    <script type="application/ld+json">
      {`
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Christiano Property Management",
        "description": "Malta's premier luxury short-term rental management company.",
        "url": "https://christianoproperties.com",
        "logo": "https://christianoproperties.com/logo.png",
        "image": "https://christianoproperties.com/og-image.jpg",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Valletta",
          "addressCountry": "MT"
        },
        "sameAs": [
          "https://www.facebook.com/christianoproperties",
          "https://www.instagram.com/christianoproperties"
        ]
      `}
    </script>
    
    <title>Christiano Property Management | Malta Vacation Rentals</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
